<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A sleek, modern calculator with a beautiful glassmorphism design.">
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <div class="calculator" id="calculator">
    <div class="display" id="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="buttons">
      <button class="btn btn-clear" id="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn btn-operator" id="btn-toggle" onclick="toggleSign()">+/−</button>
      <button class="btn btn-operator" id="btn-percent" onclick="percent()">%</button>
      <button class="btn btn-accent" id="btn-divide" onclick="appendOperator('/')">÷</button>

      <button class="btn btn-number" id="btn-7" onclick="appendNumber('7')">7</button>
      <button class="btn btn-number" id="btn-8" onclick="appendNumber('8')">8</button>
      <button class="btn btn-number" id="btn-9" onclick="appendNumber('9')">9</button>
      <button class="btn btn-accent" id="btn-multiply" onclick="appendOperator('*')">×</button>

      <button class="btn btn-number" id="btn-4" onclick="appendNumber('4')">4</button>
      <button class="btn btn-number" id="btn-5" onclick="appendNumber('5')">5</button>
      <button class="btn btn-number" id="btn-6" onclick="appendNumber('6')">6</button>
      <button class="btn btn-accent" id="btn-subtract" onclick="appendOperator('-')">−</button>

      <button class="btn btn-number" id="btn-1" onclick="appendNumber('1')">1</button>
      <button class="btn btn-number" id="btn-2" onclick="appendNumber('2')">2</button>
      <button class="btn btn-number" id="btn-3" onclick="appendNumber('3')">3</button>
      <button class="btn btn-accent" id="btn-add" onclick="appendOperator('+')">+</button>

      <button class="btn btn-number btn-zero" id="btn-0" onclick="appendNumber('0')">0</button>
      <button class="btn btn-number" id="btn-decimal" onclick="appendDecimal()">.</button>
      <button class="btn btn-equals" id="btn-equals" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    let currentInput = '0';
    let previousInput = '';
    let operator = null;
    let shouldResetScreen = false;

    const expressionEl = document.getElementById('expression');
    const resultEl = document.getElementById('result');

    function updateDisplay() {
      resultEl.textContent = currentInput;
      // Auto-shrink text if it gets long
      if (currentInput.length > 12) {
        resultEl.style.fontSize = '2rem';
      } else if (currentInput.length > 9) {
        resultEl.style.fontSize = '2.5rem';
      } else {
        resultEl.style.fontSize = '';
      }
    }

    function appendNumber(num) {
      if (currentInput === '0' || shouldResetScreen) {
        currentInput = num;
        shouldResetScreen = false;
      } else {
        if (currentInput.length >= 15) return;
        currentInput += num;
      }
      updateDisplay();
    }

    function appendDecimal() {
      if (shouldResetScreen) {
        currentInput = '0.';
        shouldResetScreen = false;
        updateDisplay();
        return;
      }
      if (currentInput.includes('.')) return;
      currentInput += '.';
      updateDisplay();
    }

    function appendOperator(op) {
      if (operator && !shouldResetScreen) {
        calculate();
      }
      previousInput = currentInput;
      operator = op;
      shouldResetScreen = true;
      const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
      expressionEl.textContent = previousInput + ' ' + opSymbol;
    }

    function calculate() {
      if (!operator || shouldResetScreen) return;
      const prev = parseFloat(previousInput);
      const current = parseFloat(currentInput);
      let result;

      switch (operator) {
        case '+': result = prev + current; break;
        case '-': result = prev - current; break;
        case '*': result = prev * current; break;
        case '/': result = current === 0 ? 'Error' : prev / current; break;
        default: return;
      }

      if (result === 'Error') {
        currentInput = 'Error';
      } else {
        // Round to avoid floating point issues
        currentInput = parseFloat(result.toFixed(10)).toString();
      }

      const opSymbol = { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator];
      expressionEl.textContent = previousInput + ' ' + opSymbol + ' ' + current;
      operator = null;
      previousInput = '';
      shouldResetScreen = true;
      updateDisplay();
    }

    function clearAll() {
      currentInput = '0';
      previousInput = '';
      operator = null;
      shouldResetScreen = false;
      expressionEl.textContent = '';
      updateDisplay();
    }

    function toggleSign() {
      if (currentInput === '0' || currentInput === 'Error') return;
      currentInput = currentInput.startsWith('-')
        ? currentInput.slice(1)
        : '-' + currentInput;
      updateDisplay();
    }

    function percent() {
      if (currentInput === 'Error') return;
      currentInput = (parseFloat(currentInput) / 100).toString();
      updateDisplay();
    }

    // Keyboard support
    document.addEventListener('keydown', (e) => {
      if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
      else if (e.key === '.') appendDecimal();
      else if (e.key === '+') appendOperator('+');
      else if (e.key === '-') appendOperator('-');
      else if (e.key === '*') appendOperator('*');
      else if (e.key === '/') { e.preventDefault(); appendOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (currentInput.length > 1 && currentInput !== 'Error') {
          currentInput = currentInput.slice(0, -1);
        } else {
          currentInput = '0';
        }
        updateDisplay();
      }
      else if (e.key === '%') percent();
    });
  </script>
</body>
</html>
